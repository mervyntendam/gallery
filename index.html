<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    :root {
      --bg: #4b5013;
      --bg-dark: #393c0e;
      --accent: #5c6118;
      --text: #f0edcc;
      --overlay: rgba(20, 22, 5, 0.92);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      max-width: 320px;
      width: 60%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg-dark);
      position: relative;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .grid-item img.loaded { opacity: 1; }

    .grid-item:hover img { transform: scale(1.05); }

    .grid-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid-item:hover::after { opacity: 1; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      user-select: none;
    }

    .lb-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.8rem;
      width: 48px;
      height: 80px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-btn:hover { background: rgba(255,255,255,0.2); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }

    #lb-close {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-close:hover { background: rgba(255,255,255,0.25); }

    #lb-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>

  <div class="grid" id="grid"></div>

  <div id="lightbox">
    <button class="lb-btn" id="lb-prev">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-btn" id="lb-next">&#8250;</button>
    <button id="lb-close">&#10005;</button>
    <div id="lb-counter"></div>
  </div>

  <script>
    // -------------------------------------------------------
    // ADD YOUR PHOTO FILENAMES HERE
    // Place your photos in the "photos/" folder next to this file
    // Supported formats: .jpg, .jpeg, .png, .webp, .gif
    // -------------------------------------------------------
    const photos = [
      'garden 1.JPG',
      'garden 2.JPG',
      'garden 3.JPG',
      'house 1.JPG',
      'house 3.jpg',
      'house 4.jpg',
      'house 5.jpeg',
      'house 6.png',
      'house.jpg',
      'studio 1.JPG',
      'studio 2.jpeg',
      'surroundings 1.JPG',
      'surroundings 2.jpeg',
      'surroundings 3.JPG',
      'surroundings 4.JPG',
    ];
    // -------------------------------------------------------

    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    photos.forEach((filename, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';

      const img = document.createElement('img');
      img.src = `photos/${filename}`;
      img.alt = `Photo ${i + 1}`;
      img.loading = 'lazy';
      img.addEventListener('load', () => img.classList.add('loaded'));
      img.addEventListener('error', () => { item.style.display = 'none'; });

      item.addEventListener('click', () => openLightbox(i));
      item.appendChild(img);
      grid.appendChild(item);
    });

    function openLightbox(index) {
      current = index;
      showPhoto();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function showPhoto() {
      lbImg.src = `photos/${photos[current]}`;
      lbCounter.textContent = `${current + 1} / ${photos.length}`;
    }

    function prev() { current = (current - 1 + photos.length) % photos.length; showPhoto(); }
    function next() { current = (current + 1) % photos.length; showPhoto(); }

    document.getElementById('lb-prev').addEventListener('click', prev);
    document.getElementById('lb-next').addEventListener('click', next);
    document.getElementById('lb-close').addEventListener('click', closeLightbox);

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });
  </script>
